<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta - Tu-Tienda</title>
    <meta name="theme-color" content="#2ecc71">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; padding-bottom: 80px; }
        .main-header { background: linear-gradient(135deg, #2ecc71, #27ae60); padding: 16px 20px; border-radius: 0 0 24px 24px; box-shadow: 0 4px 20px rgba(46,204,113,0.3); }
        .header-content { display: flex; align-items: center; max-width: 820px; margin: 0 auto; gap: 15px; }
        .btn-volver { color: white; text-decoration: none; font-size: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-volver:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
        .app-title { color: white; font-size: 22px; font-weight: 700; margin: 0; }
        .app-subtitle { color: rgba(255,255,255,0.9); font-size: 14px; margin: 0; }
        .cuenta-contenedor { max-width: 820px; margin: 20px auto; padding: 0 20px; }
        .perfil-card { background: white; border-radius: 24px; padding: 30px; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #2ecc71, #27ae60); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; font-size: 36px; color: white; }
        .perfil-card h2 { color: #0f172a; font-size: 22px; }
        .perfil-card p { color: #64748b; }
        .opciones { margin-top: 24px; display: flex; flex-direction: column; gap: 12px; }
        .opcion { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: #f8fafc; border-radius: 16px; text-decoration: none; color: #0f172a; transition: 0.3s; border: 1px solid #f1f5f9; }
        .opcion:hover { background: #f1f5f9; transform: translateX(4px); }
        .opcion i { width: 24px; color: #2ecc71; font-size: 18px; }
        .opcion span { flex: 1; font-weight: 500; }
        .opcion .flecha { color: #94a3b8; }
        .menu-inferior { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0 14px; box-shadow: 0 -4px 20px rgba(0,0,0,0.06); border-top: 1px solid #f1f5f9; max-width: 820px; margin: 0 auto; z-index: 100; }
        .menu-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; text-decoration: none; font-size: 12px; font-weight: 500; gap: 2px; transition: 0.2s; }
        .menu-item i { font-size: 22px; }
        .menu-item:hover { color: #2ecc71; }
        .menu-activo { color: #2ecc71; }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <a href="index.html" class="btn-volver"><i class="fas fa-arrow-left"></i></a>
            <div><h1 class="app-title">👤 Mi Cuenta</h1><p class="app-subtitle">Gestiona tu perfil</p></div>
        </div>
    </header>
    <main class="cuenta-contenedor">
        <div class="perfil-card">
            <div class="avatar"><i class="fas fa-user"></i></div>
            <h2>Usuario Macas</h2>
            <p>📧 usuario@tutienda.com</p>
            <div class="opciones">
                <a href="#" class="opcion"><i class="fas fa-user-edit"></i><span>Editar perfil</span><i class="fas fa-chevron-right flecha"></i></a>
                <a href="#" class="opcion"><i class="fas fa-store"></i><span>Mis negocios</span><i class="fas fa-chevron-right flecha"></i></a>
                <a href="#" class="opcion"><i class="fas fa-bell"></i><span>Notificaciones</span><i class="fas fa-chevron-right flecha"></i></a>
                <a href="#" class="opcion"><i class="fas fa-cog"></i><span>Configuración</span><i class="fas fa-chevron-right flecha"></i></a>
                <a href="index.html" class="opcion" style="border-color: #fee2e2;"><i class="fas fa-sign-out-alt" style="color:#ef4444;"></i><span style="color:#ef4444;">Cerrar sesión</span><i class="fas fa-chevron-right flecha"></i></a>
            </div>
        </div>
    </main>
    <nav class="menu-inferior">
        <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="mapa.html" class="menu-item"><i class="fas fa-map"></i><span>Mapa</span></a>
        <a href="dm.html" class="menu-item"><i class="fas fa-comment-dots"></i><span>DM</span></a>
        <a href="alerta.html" class="menu-item"><i class="fas fa-bell"></i><span>Alertas</span></a>
        <a href="cuenta.html" class="menu-item menu-activo"><i class="fas fa-user"></i><span>Cuenta</span></a>
    </nav>
</body>
</html>
