<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Negocios - Tu-Tienda</title>
    <meta name="theme-color" content="#2ecc71">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; padding-bottom: 80px; }
        .main-header { background: linear-gradient(135deg, #2ecc71, #27ae60); padding: 16px 20px; border-radius: 0 0 24px 24px; box-shadow: 0 4px 20px rgba(46,204,113,0.3); }
        .header-content { display: flex; align-items: center; max-width: 820px; margin: 0 auto; gap: 15px; }
        .btn-volver { color: white; text-decoration: none; font-size: 20px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-volver:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
        .app-title { color: white; font-size: 22px; font-weight: 700; margin: 0; }
        .app-subtitle { color: rgba(255,255,255,0.9); font-size: 14px; margin: 0; }
        .lista-contenedor { max-width: 820px; margin: 20px auto; padding: 0 20px; }
        .negocio-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); border: 1px solid #f1f5f9; transition: 0.3s; }
        .negocio-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .negocio-card h3 { color: #0f172a; font-size: 20px; display: flex; align-items: center; gap: 10px; }
        .negocio-card h3 i { color: #2ecc71; }
        .negocio-card .categoria { color: #2ecc71; font-weight: 600; font-size: 14px; margin: 4px 0 8px; }
        .negocio-card .detalle { display: flex; align-items: center; gap: 10px; color: #64748b; font-size: 14px; margin: 6px 0; }
        .negocio-card .detalle i { width: 20px; color: #2ecc71; }
        .negocio-card .fecha { color: #94a3b8; font-size: 12px; margin-top: 8px; }
        .sin-negocios { text-align: center; padding: 40px; color: #94a3b8; background: white; border-radius: 20px; border: 2px dashed #e2e8f0; }
        .sin-negocios i { font-size: 48px; color: #e2e8f0; margin-bottom: 12px; }
        .menu-inferior { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px 0 14px; box-shadow: 0 -4px 20px rgba(0,0,0,0.06); border-top: 1px solid #f1f5f9; max-width: 820px; margin: 0 auto; z-index: 100; }
        .menu-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; text-decoration: none; font-size: 12px; font-weight: 500; gap: 2px; transition: 0.2s; }
        .menu-item i { font-size: 22px; }
        .menu-item:hover { color: #2ecc71; }
        .menu-activo { color: #2ecc71; }
        @media (max-width: 640px) { .negocio-card { padding: 16px; } }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <a href="index.html" class="btn-volver"><i class="fas fa-arrow-left"></i></a>
            <div><h1 class="app-title">🏪 Lista de Negocios</h1><p class="app-subtitle">Negocios registrados en Tu-Tienda</p></div>
        </div>
    </header>

    <main class="lista-contenedor" id="listaNegocios">
        <!-- Los negocios se cargarán aquí con JavaScript -->
        <div class="sin-negocios">
            <i class="fas fa-store-alt"></i>
            <p>No hay negocios registrados aún.</p>
            <p style="font-size:13px;">Agrega tu negocio desde el menú principal.</p>
        </div>
    </main>

    <nav class="menu-inferior">
        <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="mapa.html" class="menu-item"><i class="fas fa-map"></i><span>Mapa</span></a>
        <a href="dm.html" class="menu-item"><i class="fas fa-comment-dots"></i><span>DM</span></a>
        <a href="alerta.html" class="menu-item"><i class="fas fa-bell"></i><span>Alertas</span></a>
        <a href="cuenta.html" class="menu-item menu-activo"><i class="fas fa-user"></i><span>Cuenta</span></a>
    </nav>

    <script>
        // ============================================
        // FUNCIÓN PARA MOSTRAR NEGOCIOS GUARDADOS
        // ============================================
        function mostrarNegocios() {
            const contenedor = document.getElementById('listaNegocios');
            const negocios = JSON.parse(localStorage.getItem('negocios')) || [];
            
            // Si no hay negocios, mostrar mensaje
            if (negocios.length === 0) {
                contenedor.innerHTML = `
                    <div class="sin-negocios">
                        <i class="fas fa-store-alt"></i>
                        <p>No hay negocios registrados aún.</p>
                        <p style="font-size:13px; color:#94a3b8;">Agrega tu negocio desde el menú principal.</p>
                    </div>
                `;
                return;
            }
            
            // Generar tarjetas para cada negocio (mostrando los más nuevos primero)
            let html = '';
            const negociosRecientes = [...negocios].reverse();
            
            negociosRecientes.forEach((negocio, index) => {
                // Formatear fecha
                let fechaMostrar = 'Fecha no disponible';
                if (negocio.fecha) {
                    const fecha = new Date(negocio.fecha);
                    fechaMostrar = fecha.toLocaleDateString('es-EC', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
                
                // Asignar ícono según categoría
                const iconosCategoria = {
                    'farmacia': 'fa-hospital',
                    'restaurante': 'fa-utensils',
                    'supermercado': 'fa-shopping-cart',
                    'taller': 'fa-wrench',
                    'taxi': 'fa-taxi',
                    'hotel': 'fa-hotel',
                    'panaderia': 'fa-bread-slice',
                    'fruteria': 'fa-apple-alt',
                    'carniceria': 'fa-drumstick-bite',
                    'electronica': 'fa-laptop',
                    'ropa': 'fa-tshirt',
                    'peluqueria': 'fa-cut',
                    'gimnasio': 'fa-dumbbell',
                    'reparacion': 'fa-tools',
                    'otros': 'fa-store'
                };
                const icono = iconosCategoria[negocio.categoria] || 'fa-store';
                
                html += `
                    <div class="negocio-card">
                        <h3><i class="fas ${icono}"></i> ${negocio.nombre}</h3>
                        <div class="categoria">📂 ${negocio.categoria}</div>
                        <div class="detalle"><i class="fas fa-map-marker-alt"></i> ${negocio.direccion}</div>
                        <div class="detalle"><i class="fas fa-phone"></i> ${negocio.telefono}</div>
                        <div class="detalle"><i class="fas fa-clock"></i> ${negocio.horario}</div>
                        ${negocio.descripcion ? `<div class="detalle"><i class="fas fa-align-left"></i> ${negocio.descripcion}</div>` : ''}
                        <div class="fecha"><i class="far fa-calendar-alt"></i> Registrado: ${fechaMostrar}</div>
                    </div>
                `;
            });
            
            contenedor.innerHTML = html;
        }
        
        // Cargar los negocios al abrir la página
        document.addEventListener('DOMContentLoaded', mostrarNegocios);
    </script>
</body>
</html>
